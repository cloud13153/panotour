<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Плеер тура</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #07111f;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #tour-player {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(91, 160, 255, 0.24), transparent 42%),
        linear-gradient(180deg, #102037 0%, #07111f 100%);
    }

    .tour-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: #e8eefc;
      background: #07111f;
    }

    .tour-fallback p {
      max-width: 420px;
      margin: 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="tour-player">
    <noscript>
      <div class="tour-fallback">
        <p>Для корректного отображения виртуального тура включите JavaScript в настройках браузера.</p>
      </div>
    </noscript>
  </div>

  <script src="finaldata/final.js"></script>
  <script>
    embedpano({
      xml: "finaldata/final.xml",
      target: "tour-player",
      html5: "only",
      mobilescale: 1.0,
      passQueryParameters: true
    });
  </script>
</body>
</html>
